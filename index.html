<title>For My Love ❤️</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: Arial;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  overflow: hidden;
  text-align: center;
}

button {
  border: none;
  padding: 15px 35px;
  font-size: 22px;
  border-radius: 50px;
  cursor: pointer;
  margin: 10px;
  transition: all .5s ease;
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  font-weight: bold;
  font-style: oblique;
}

#yes {
  background: #ff2e63;
  color: white;
  box-shadow: 10px 20px 15px rgba(0,0,0,0.2);
}

#no {
  background: white;
  color: #ff2e63;
  position: relative;
  box-shadow: 10px 20px 15px rgba(0,0,0,0.2);
}

.result {
  display: none;
  color: white;
  font-size: 32px;
  margin-top: 20px;
}

.love-img {
  display: none;
  margin-top: 30px;
  width: 300px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  animation: fadeIn 1s ease-in-out;
}

#buttons {
  margin-top: 40px;
}

h1 {
  color: white;
  font-size: 38px;
  margin-bottom: 40px;
  transition: .5s;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 1; transform: scale(1); }
}

.heart {
  position: absolute;
  color: #ff2e63;
  font-size: 20px;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

.book {
  position: relative;
  border-radius: 10px;
  width: 220px;
  height: 300px;
  background-color: whitesmoke;
  box-shadow: 1px 1px 12px #000;
  transform: preserve-3d;
  perspective: 2000px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
}

.cover {
  top: 0;
  position: absolute;
  background-color: rgb(240, 240, 240);
  width: 100%;
  height: 100%;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.5s;
  transform-origin: 0;
  box-shadow: 1px 1px 12px #f6739a;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* .book:hover .cover {
  transform: rotateY(-82deg);
} */

p {
  font-size: 20px;
  font-weight: bolder;
}

/* Mobile styles */
@media (max-width: 768px) {
  body {
    padding: 20px;
  }

  h1 {
    font-size: 32px;
    margin-bottom: 25px;
  }
#result {
    font-size: 100%;
    font-weight: bolder;

}
#cover p {
    font-size: 16% !important;
font-weight: bolder !important;
}
  #buttons {
    margin-top: 20px;
  }
#no{
   
    margin-top: 50px;
  
}
  button {
    padding: 14px 28px;
    font-size: 20px;
    margin: 8px;
    border-radius: 25px;
  }
 #question{
    font-size: 18px;
 }
  #questionGif {
    width: 100% !important;
    max-width: 320px;
    height: auto;
    margin-top: 0px !important;
    margin: auto !important;
    margin-left:-40px !important ;
  }

  .book {
    margin-top: 30px;
    width: 200px;
    height: 260px;
  }

  #loveImg {
    width: 70% !important;
    height: 100%;
    object-fit: cover;
    border-radius: 3%;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  .result {
    font-size: 26px;
    margin-top: 15px;
  }

  p {
    font-size: 18px;
  }
}
</style>

</span>
</h1>

<div>
<img id="questionGif" src="gif.gif" style="z-index:1;width:220px;margin-top:-30px;margin-bottom:60px;display:inline-block">

<div id="buttons">

        width:90%;
        font-weight:bold;
        font-size:18px;
        box-sizing:border-box;
    ">
    "I feel like we could be really good together and I'd like us to give it a chance and get closer I hope we stay together and that you want that too"
    </p>
  </div>

<div style="margin-top:20px;text-align:center; " id="pageButtons">
<button id="prevPage" style="background-color: #ed3a57;">Prev</button>

</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  let noBtn = document.getElementById("no");
  let yesBtn = document.getElementById("yes");
  let result = document.getElementById("result");
  let question = document.getElementById("question");
  let questionGif = document.getElementById("questionGif");

  let stage = 0;
  let positions = [
    {left:"5%",top:"50%"},{left:"60%",top:"50%"},{left:"50%",top:"10%"},
    {left:"50%",top:"85%"},{left:"5%",top:"10%"},{left:"60%",top:"10%"},
    {left:"5%",top:"90%"},{left:"50%",top:"50%"}
  ];
  let index = 0;

  function moveNoButton(){
    if(stage>=5){
      index=(index+1)%positions.length;
      noBtn.style.left=positions[index].left;
      noBtn.style.top=positions[index].top;
    }
  }

  noBtn.addEventListener("mouseenter", moveNoButton);
  noBtn.addEventListener("touchmove", (e)=>{ e.preventDefault(); moveNoButton(); }, {passive:false});
  noBtn.addEventListener("click", moveNoButton);

  noBtn.onclick = ()=>{
    stage++;
    if(stage==1){ noBtn.innerText="Are you sure?😔"; yesBtn.style.transform="scale(3)"; noBtn.style.transform="scale(0.8)"; noBtn.style.marginLeft="120px";}
    else if(stage==3){ noBtn.innerText="You dont want to reject me 😢"; yesBtn.style.transform="scale(5)"; noBtn.style.transform="scale(0.6)"; noBtn.style.marginLeft="160px";}
    else if(stage==4){ noBtn.innerText="Press YES please🥺"; yesBtn.style.transform="scale(6)"; noBtn.style.transform="scale(0.4)"; noBtn.style.marginLeft="200px";}
    else if(stage==5){ noBtn.innerText="Okay its your choice 😔"; yesBtn.style.transform="scale(7)"; noBtn.style.transform="scale(0.3)"; noBtn.style.position="absolute"; noBtn.style.marginLeft="230px";}
  };

  yesBtn.onclick = ()=>{
    document.getElementById("buttons").style.display="none";
    question.style.display="none";
    questionGif.style.display="none";
    result.style.display="block";

    setInterval(()=>{
      let heart=document.createElement("div");
      heart.className="heart";
      heart.innerHTML="❤️";
      heart.style.left=Math.random()*100+"vw";
      heart.style.bottom=Math.random()*50+"vw";
      heart.style.fontSize=(Math.random()*30+30)+"px";
      heart.style.animationDuration=(Math.random()*6+6)+"s";
      document.body.appendChild(heart);
      setTimeout(()=>{ heart.remove(); },8000);
    },400);

    // إعداد الصور
    let images=["sora50.jpg","sora50.jpg","sora50.jpg","sora50.jpg","sora50.jpg",];
    for(let i=1;i<=50;i++){ images.push(``); }

    let book=document.getElementById("book");
    let pages=[];
    for(let i=1;i<images.length;i++){
      let page=document.createElement("div");
      page.className="page";
      page.style.position="absolute";
      page.style.width="85%";
      page.style.height="70%";
      page.style.border="10px solid rgb(244 244 244)           ";
      page.style.top="4%";
      page.style.borderRadius="10px";
      page.style.transformOrigin="left";
      page.style.transition="transform 1s";
      page.style.transformStyle = "preserve-3d";
      page.style.zIndex = images.length - i;

      let img=document.createElement("img");
      img.src=images[i];
      img.style.width="89%";
      img.style.borderRadius="10px";
      img.style.display="block";
      img.style.margin="auto";
      img.style.marginTop="10px";

      page.appendChild(img);
      book.appendChild(page);
      pages.push(page);
    }

    let cover=document.querySelector(".cover");

    // Flip pages with 3D effect
    let currentPage=0;
    document.getElementById("nextPage").onclick = ()=>{
      if(currentPage<pages.length){
        let page = pages[currentPage];
        page.style.zIndex = pages.length + currentPage + 1;
        page.style.transform = "rotateY(-180deg)"; // تقليب 3D
        page.style.boxShadow = "0 0 15px rgba(0,0,0,0.2)"; // ظل خفيف للواقعية
        currentPage++;
        if(currentPage===1 && cover){ cover.style.display="none"; }
      }
    }

    document.getElementById("prevPage").onclick = ()=>{
      if(currentPage>0){
        currentPage--;
        let page = pages[currentPage];
        page.style.transform = "rotateY(0deg)";
        page.style.zIndex = pages.length - currentPage;
        page.style.boxShadow = "none";
        if(currentPage===0 && cover){ cover.style.display="flex"; }
      }
    }

  };

});
</script>
</body>
